<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Countdown In Progress - Photo Booth</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
            extend: {
                colors: {
                "primary": "#f9f506",
                "background-light": "#f8f8f5",
                "background-dark": "#23220f",
                "surface-light": "#ffffff",
                "surface-dark": "#2d2c1b",
                },
                fontFamily: {
                "display": ["Spline Sans", "sans-serif"]
                },
                borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
            },
            },
        }
    </script>
<style>/* Custom Keyframe for the pulsing countdown */
@keyframes pulse-countdown {
    0% {
        transform: scale(0.8);
        opacity: 0;
        } 50% {
        transform: scale(1.1);
        opacity: 1;
        } 100% {
        transform: scale(1);
        opacity: 0.8;
        }
    }
.animate-countdown {
    animation: pulse-countdown 0.8s ease-out infinite
    }
/* Simulating a camera feed background */
.camera-feed {
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuC3_on2ObsL_EgbiiQu-j6CmGQAGo01yCQoYSHdryEc4JxrweSoGy2Dh-V-aj-aYgwQ7BBXGqLg_3-AbA3xNZlqk7soYOWtYytMoOTa_AjMyDvlkti5QVQ-yvUMMq0Wme6zKCGa01CgcltdeHBxahmX5PXtwHobp4wyLZYHPATQDiWCdynNGen6uaAGjQLu4zb4LPomGXIa59bTdYfb6OvnSVDCTIi_wOZAsJtsDduqy6S2X4FAJx5Um4F4Jp3JKCNUZ8rBPptBqTs);
    background-size: cover;
    background-position: center
    }</style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-800 dark:text-slate-100 font-display min-h-screen flex flex-col overflow-hidden relative selection:bg-primary selection:text-black">
<!-- Main Viewport Container -->
<main class="flex-grow flex items-center justify-center p-4 md:p-6 lg:p-8 w-full h-screen box-border">
<!-- Camera Viewfinder Card -->
<div class="relative w-full max-w-6xl h-full max-h-[90vh] bg-surface-light dark:bg-surface-dark rounded-xl md:rounded-lg shadow-2xl overflow-hidden ring-4 ring-white dark:ring-surface-dark flex flex-col justify-center items-center group">
<!-- Live Camera Feed (Simulated) -->
<!-- Note: Applied blur-sm to simulate focus on the countdown overlay as requested -->
<div class="absolute inset-0 camera-feed blur-[3px] scale-105 transition-all duration-700" data-alt="Portrait of a young woman smiling for a photo booth picture"></div>
<!-- Overlay Gradient for better text readability -->
<div class="absolute inset-0 bg-gradient-to-b from-black/20 via-transparent to-black/30 pointer-events-none"></div>
<!-- UI Layer: Top Controls -->
<div class="absolute top-0 left-0 w-full p-6 flex justify-between items-start z-20">
<!-- Flash Settings -->
<button class="bg-white/20 backdrop-blur-md hover:bg-primary hover:text-black text-white p-3 rounded-full transition-all duration-300 flex items-center justify-center group shadow-lg ring-1 ring-white/30">
<span class="material-icons-round text-2xl">flash_on</span>
</button>
<!-- Status Text -->
<div class="bg-white/90 dark:bg-black/80 backdrop-blur-md px-6 py-2 rounded-full shadow-lg transform translate-y-2">
<span class="text-sm font-bold tracking-widest uppercase text-slate-800 dark:text-primary">Ready? Smile!</span>
</div>
<!-- Grid/Settings -->
<button class="bg-white/20 backdrop-blur-md hover:bg-primary hover:text-black text-white p-3 rounded-full transition-all duration-300 flex items-center justify-center shadow-lg ring-1 ring-white/30">
<span class="material-icons-round text-2xl">grid_4x4</span>
</button>
</div>
<!-- UI Layer: Center Countdown -->
<!-- Massive centered number with pulsing animation -->
<div class="relative z-30 flex flex-col items-center justify-center select-none pointer-events-none">
<h1 class="text-[12rem] md:text-[18rem] lg:text-[22rem] leading-none font-bold text-white drop-shadow-2xl animate-countdown opacity-90 mix-blend-overlay">
                    3
                </h1>
</div>
<!-- UI Layer: Bottom Action Bar -->
<div class="absolute bottom-8 left-0 w-full flex justify-center items-center z-40 px-4">
<div class="flex items-center gap-4 bg-white/10 backdrop-blur-xl border border-white/20 p-2 pl-6 pr-2 rounded-full shadow-2xl">
<!-- Timer Indicator (Static for this view) -->
<div class="flex items-center gap-2 text-white/80 mr-4">
<span class="material-icons-round text-xl">timer</span>
<span class="font-medium text-sm">3s</span>
</div>
<!-- Cancel Button -->
<!-- Using Primary Color for the button background, Black text for contrast as per theme rules -->
<button class="bg-primary hover:bg-[#e6e205] text-black font-bold text-lg px-8 py-4 rounded-full shadow-lg shadow-primary/20 transform hover:scale-105 active:scale-95 transition-all duration-200 flex items-center gap-2">
<span class="material-icons-round">close</span>
<span>Cancel</span>
</button>
</div>
</div>
<!-- Decorative corner accents (camera viewfinder marks) -->
<div class="absolute top-8 left-8 w-16 h-16 border-t-4 border-l-4 border-white/30 rounded-tl-3xl pointer-events-none"></div>
<div class="absolute top-8 right-8 w-16 h-16 border-t-4 border-r-4 border-white/30 rounded-tr-3xl pointer-events-none"></div>
<div class="absolute bottom-8 left-8 w-16 h-16 border-b-4 border-l-4 border-white/30 rounded-bl-3xl pointer-events-none"></div>
<div class="absolute bottom-8 right-8 w-16 h-16 border-b-4 border-r-4 border-white/30 rounded-br-3xl pointer-events-none"></div>
</div>
</main>
<!-- Global Decoration/Background Elements -->
<!-- Subtle pattern in the main page background to add texture -->
<div class="fixed inset-0 pointer-events-none opacity-5 dark:opacity-5 z-[-1]" style="background-image: radial-gradient(#23220f 1px, transparent 1px); background-size: 24px 24px;"></div>
</body></html>
